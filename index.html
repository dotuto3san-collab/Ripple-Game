<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RippleGame Professional</title>
    <style>
        :root { --bg-color: #121212; --panel-color: #2a2a2a; --accent: #3b82f6; --danger: #ef4444; }
        body { 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100dvh; 
            margin: 0; 
            color: white; 
            font-family: system-ui, -apple-system, sans-serif; 
            touch-action: none; 
            overflow: hidden; 
        }
        
        #game-container { 
            display: flex; 
            flex-direction: row; 
            gap: 10px; 
            background-color: var(--panel-color); 
            padding: 10px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 98vw; 
            height: 620px; 
            align-items: stretch; 
        }
        
        #canvas-area { 
            position: relative; 
            background-color: #000; 
            border: 2px solid #555; 
            border-radius: 4px; 
            overflow: hidden; 
            width: 800px; 
            height: 600px; 
            cursor: grab;
        }
        #canvas-area:active { cursor: grabbing; }

        #extra-link { 
            position: absolute; top: 10px; left: 10px; z-index: 40; 
            background: rgba(34,68,136,0.8); color: #fff; padding: 8px 12px; 
            border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: bold; border: 1px solid #224499; 
        }

        #inspector { 
            width: 260px; 
            height: 600px; 
            display: flex; 
            flex-direction: column; 
            background-color: #444; 
            padding: 10px; 
            border-radius: 4px; 
            font-size: 14px; 
            box-sizing: border-box;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #toggleInspector {
            display: none;
            position: absolute;
            right: -40px; /* 左から出るのでボタンは右側に配置 */
            top: 0;
            width: 40px;
            height: 40px;
            background: #555;
            border: 1px solid #666;
            border-left: none;
            border-radius: 0 4px 4px 0;
            z-index: 100;
        }

        .header { font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #666; padding-bottom: 3px; flex-shrink: 0; }
        .usage-text { 
            font-size: 10px; color: #ccc; margin-bottom: 8px; line-height: 1.3; 
            background: rgba(0,0,0,0.2); padding: 6px; border-radius: 2px; flex-shrink: 0;
        }
        
        .scroll-area { 
            flex-grow: 1; 
            overflow-y: auto; 
            background: #1a1a1a; 
            padding: 4px; 
            border: 1px solid #222; 
            margin-bottom: 10px; 
        }
        
        .click-entry { background-color: #555; padding: 3px; margin-bottom: 3px; border-radius: 3px; display: flex; gap: 4px; align-items: center; }
        .click-entry span { font-size: 10px; color: #ccc; }
        .click-entry input { width: 36px; background-color: #222; color: #fff; border: 1px solid #777; text-align: center; font-size: 11px; padding: 2px 0; }
        .active-entry { border: 1px solid #ffff00; background-color: #664; }
        
        canvas { display: block; width: 100%; height: 100%; }
        #langBtn { position: absolute; top: 10px; right: 10px; background: #444; font-size: 14px; padding: 8px 16px; border: 1px solid #666; z-index: 50; border-radius: 4px; color: white; }
        #menuBtn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid #fff; padding: 8px 16px; z-index: 45; display: none; border-radius: 4px; }
        
        button { cursor: pointer; color: white; border: none; border-radius: 3px; font-weight: bold; }
        .btn-plus { background-color: #4a4; padding: 2px 10px; font-size: 16px; }
        
        .control-group { 
            background: #333; padding: 8px; border-radius: 4px;
            display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
        }
        .btn-start { background-color: #44a; padding: 10px 0; font-size: 13px; }
        .btn-reset { background-color: #666; padding: 10px 0; font-size: 13px; }
        input[type="range"] { width: 100%; margin: 4px 0; }

        @media (max-width: 1024px) {
            body { overflow-y: auto; touch-action: auto; align-items: flex-start; padding: 0; }
            #game-container { 
                flex-direction: column; 
                width: 100%; 
                height: auto; 
                max-width: 100vw; 
                padding: 0;
                gap: 0;
            }
            #canvas-area { width: 100%; height: 60dvh; border: none; border-radius: 0; }
            #inspector { 
                position: fixed;
                left: 0; /* 左側に配置 */
                top: 60px;
                width: 220px; /* 少し小さめに */
                height: auto;
                max-height: 70dvh;
                z-index: 1000;
                transform: translateX(-100%); /* 左側に隠す */
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }
            #inspector.open { transform: translateX(0); }
            #toggleInspector { display: block; }
            
            /* スマホ版AUTOPLAYの列調整 */
            .click-entry { padding: 5px; gap: 2px; }
            .click-entry input { width: 45px; height: 25px; font-size: 14px; }
            .click-entry span { min-width: 25px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="canvas-area">
        <a id="extra-link" href="https://lightspuzzle.netlify.app/">🔗 通常版はこちら</a>
        <button id="langBtn" onclick="toggleLang()">JP/EN</button>
        <button id="menuBtn" onclick="backToTitle()">MENU</button>
        <canvas id="gameCanvas" oncontextmenu="return false;"></canvas>
    </div>

    <div id="inspector" style="display: none;">
        <button id="toggleInspector" onclick="toggleInspector()">⚙️</button>
        <div class="header">
            <span id="labelAutoPlay">Auto Play</span>
            <button class="btn-plus" onclick="addEntry()">+</button>
        </div>
        <div id="labelUsage" class="usage-text"></div>
        <div id="scrollArea" class="scroll-area"></div>
        <div class="control-group">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom: 2px;">
                <span id="labelSpeed">Speed</span><span>x<span id="speedVal">1.0</span></span>
            </div>
            <input type="range" id="speedRange" min="0.5" max="10.0" step="0.5" value="1.0" oninput="updateSpeed(this.value)">
            <button id="autoStartBtn" class="btn-start" onclick="toggleAutoPlay()">START AUTO</button>
            <button id="btnResetBoard" class="btn-reset" onclick="resetBoard()">RESET BOARD</button>
            <button id="btnRetryLevel" style="background:#d4a017; padding:10px 0; margin-top:2px; display:none;" onclick="retryGame()">RETRY LEVEL</button>
        </div>
    </div>
</div>

<script>
const i18n = {
    ja: {
        rules: [
            "【遊び方】",
            "・タイルをタップして波紋を広げます。",
            "・波紋が通過したタイルの色は反転します。",
            "・画面内の全タイルを同じ色に揃えればクリア！",
            "",
            "【操作】",
            "・タップ：波紋の発生",
            "・右クリック/2本指ドラッグ：盤面の移動",
            "・ホイール/ピンチ：ズーム"
        ],
        titleDesc: "サイズ設定：数字をタップして変更（2-255）",
        startBtn: "START GAME", autoPlay: "Auto Play",
        usage: "＋で座標を追加。STARTで順次実行。移動やズームで盤面を確認できます。",
        speed: "速度", startAuto: "START AUTO", stopAuto: "STOP AUTO", resetBoard: "RESET BOARD", retryLevel: "RETRY LEVEL",
        win: "CLEAR!!", promptCols: "列数を入力", promptRows: "行数を入力"
    },
    en: {
        rules: [
            "【HOW TO PLAY】",
            "• Tap a tile to generate a ripple.",
            "• Tiles hit by ripples flip their colors.",
            "• Clear by making all tiles the same color!",
            "",
            "【CONTROLS】",
            "• Tap: Generate ripple",
            "• Right-click/2-Finger drag: Pan board",
            "• Wheel/Pinch: Zoom"
        ],
        titleDesc: "Size: Tap numbers to change (2-255)",
        startBtn: "START GAME", autoPlay: "Auto Play",
        usage: "Tap '+' to add points. START runs them in order. Pan and zoom to inspect.",
        speed: "Speed", startAuto: "START AUTO", stopAuto: "STOP AUTO", resetBoard: "RESET BOARD", retryLevel: "RETRY LEVEL",
        win: "YOU WIN!", promptCols: "Enter columns", promptRows: "Enter rows"
    }
};

let currentLang = 'ja';
const WIDTH = 800, HEIGHT = 600;
let state = 'TITLE', colsInput = "5", rowsInput = "5", activeInput = 'cols', board = null;
let isWin = false, hasStarted = false, scale = 1.0, camX = WIDTH/2, camY = HEIGHT/2;
let isDragging = false, lastMouseX = 0, lastMouseY = 0, baseCellSize = 50;
let lastPinchDist = 0, isPinching = false;
let autoEntries = [], autoIndex = -1, isAutoPlaying = false, autoTimer = null, autoSpeed = 1000;

class Source { constructor(x, y, maxDist) { this.x = x; this.y = y; this.time = 0; this.maxDist = maxDist; } step() { if (this.time < this.maxDist) this.time++; } }
class Board {
    constructor(w, h) { this.width = w; this.height = h; this.cells = new Array(w * h).fill(false); this.sources = []; this.maxDist = w + h; }
    addSource(x, y) { this.sources.push(new Source(x, y, this.maxDist)); }
    step() { for (let s of this.sources) s.step(); }
    update() {
        this.cells.fill(false);
        for (let s of this.sources) {
            for (let y = 0; y < this.height; y++) {
                const row = y * this.width;
                for (let x = 0; x < this.width; x++) {
                    if (Math.abs(x - s.x) + Math.abs(y - s.y) <= s.time) this.cells[row + x] = !this.cells[row + x];
                }
            }
        }
    }
}

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const inspector = document.getElementById('inspector'), menuBtn = document.getElementById('menuBtn');
const langBtn = document.getElementById('langBtn');
canvas.width = WIDTH; canvas.height = HEIGHT;

function toggleLang() { currentLang = currentLang === 'ja' ? 'en' : 'ja'; updateUIText(); draw(); }
function updateUIText() {
    const t = i18n[currentLang];
    document.getElementById('labelAutoPlay').innerText = t.autoPlay;
    document.getElementById('labelUsage').innerText = t.usage;
    document.getElementById('labelSpeed').innerText = t.speed;
    document.getElementById('btnResetBoard').innerText = t.resetBoard;
    document.getElementById('btnRetryLevel').innerText = t.retryLevel;
    document.getElementById('autoStartBtn').innerText = isAutoPlaying ? t.stopAuto : t.startAuto;
}

function initGame() {
    let c = parseInt(colsInput) || 5, r = parseInt(rowsInput) || 5;
    board = new Board(c, r); isWin = false; hasStarted = false; autoIndex = -1;
    baseCellSize = 50;
    scale = Math.min(WIDTH/(c*baseCellSize+40), HEIGHT/(r*baseCellSize+40), 1.0);
    camX = WIDTH/2; camY = HEIGHT/2;
    state = 'PLAY'; inspector.style.display = 'flex'; menuBtn.style.display = 'block'; langBtn.style.display = 'none';
    document.getElementById('extra-link').style.display = 'none';
    updateUIText(); draw();
}

function backToTitle() { stopAutoPlay(); state = 'TITLE'; inspector.style.display = 'none'; menuBtn.style.display = 'none'; langBtn.style.display = 'block'; document.getElementById('extra-link').style.display = 'block'; draw(); }

function toggleInspector() { inspector.classList.toggle('open'); }

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    if (state === 'TITLE') {
        const t = i18n[currentLang];
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 60px sans-serif"; ctx.fillText("RippleGame", WIDTH/2, 100);
        ctx.font = "14px sans-serif"; ctx.textAlign = "left"; ctx.fillStyle = "#ccc";
        t.rules.forEach((line, i) => ctx.fillText(line, WIDTH/2 - 200, 160 + i * 22));
        ctx.textAlign = "center"; ctx.fillStyle = "#888"; ctx.fillText(t.titleDesc, WIDTH/2, 410);
        ctx.font = "bold 28px monospace";
        ctx.fillStyle = (activeInput === 'cols') ? "#3b82f6" : "white"; ctx.fillText(`Cols: ${colsInput}`, WIDTH/2 - 80, 450);
        ctx.fillStyle = (activeInput === 'rows') ? "#3b82f6" : "white"; ctx.fillText(`Rows: ${rowsInput}`, WIDTH/2 + 80, 450);
        ctx.fillStyle = "#3b82f6"; ctx.fillRect(WIDTH/2 - 100, 490, 200, 50);
        ctx.fillStyle = "white"; ctx.font = "bold 18px sans-serif"; ctx.fillText(t.startBtn, WIDTH/2, 522);
    } else {
        ctx.translate(camX, camY);
        ctx.scale(scale, scale);
        const bW = board.width * baseCellSize, bH = board.height * baseCellSize;
        ctx.translate(-bW/2, -bH/2);
        for (let y = 0; y < board.height; y++) {
            for (let x = 0; x < board.width; x++) {
                ctx.fillStyle = board.cells[y * board.width + x] ? '#ff0' : '#333';
                ctx.fillRect(x * baseCellSize + 1, y * baseCellSize + 1, baseCellSize - 2, baseCellSize - 2);
            }
        }
        if (isWin) {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 60px sans-serif"; ctx.fillText(i18n[currentLang].win, WIDTH/2, HEIGHT/2);
        }
    }
}

function handleInteraction(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const mx = (clientX - rect.left) * (WIDTH / rect.width);
    const my = (clientY - rect.top) * (HEIGHT / rect.height);
    if (state === 'TITLE') {
        if (my > 490 && my < 540 && mx > WIDTH / 2 - 100 && mx < WIDTH / 2 + 100) initGame();
        else if (my > 430 && my < 470) {
            activeInput = (mx < WIDTH / 2) ? 'cols' : 'rows';
            let v = prompt(i18n[currentLang][activeInput === 'cols' ? 'promptCols' : 'promptRows'], activeInput === 'cols' ? colsInput : rowsInput);
            if (v) { let n = parseInt(v); if (!isNaN(n)) { n = Math.max(2, Math.min(255, n)); if (activeInput === 'cols') colsInput = n.toString(); else rowsInput = n.toString(); } }
            draw();
        }
    } else if (state === 'PLAY' && !isWin && !isAutoPlaying) {
        const worldX = (mx - camX) / scale + (board.width * baseCellSize) / 2;
        const worldY = (my - camY) / scale + (board.height * baseCellSize) / 2;
        const x = Math.floor(worldX / baseCellSize), y = Math.floor(worldY / baseCellSize);
        if (x >= 0 && y >= 0 && x < board.width && y < board.height) { board.addSource(x, y); board.step(); board.update(); hasStarted = true; checkWin(); draw(); }
    }
}

// 多重反応防止用のフラグ
let touchStartTime = 0;

canvas.addEventListener('mousedown', e => {
    if (Date.now() - touchStartTime < 500) return; // タッチ直後のマウスエミュレーションを無視
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    if (e.button === 2 || e.button === 1) { isDragging = true; return; }
    handleInteraction(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => {
    if (isDragging) {
        camX += (e.clientX - lastMouseX) * (WIDTH / canvas.offsetWidth);
        camY += (e.clientY - lastMouseY) * (HEIGHT / canvas.offsetHeight);
        draw();
    }
    lastMouseX = e.clientX; lastMouseY = e.clientY;
});
window.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('wheel', e => { if (state !== 'PLAY') return; e.preventDefault(); scale = Math.min(Math.max(scale * Math.exp(-e.deltaY * 0.001), 0.01), 50); draw(); }, { passive: false });

canvas.addEventListener('touchstart', e => {
    touchStartTime = Date.now();
    if (e.touches.length === 1) { lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY; isPinching = false; }
    else if (e.touches.length === 2) { isPinching = true; lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); lastMouseX = (e.touches[0].clientX + e.touches[1].clientX) / 2; lastMouseY = (e.touches[0].clientY + e.touches[1].clientY) / 2; }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        scale = Math.min(Math.max(scale * (dist / lastPinchDist), 0.01), 50);
        camX += (midX - lastMouseX) * (WIDTH / canvas.offsetWidth);
        camY += (midY - lastMouseY) * (HEIGHT / canvas.offsetHeight);
        lastPinchDist = dist; lastMouseX = midX; lastMouseY = midY; draw();
    }
}, { passive: false });
canvas.addEventListener('touchend', e => {
    e.preventDefault(); 
    // ピンチ中だったり、時間が短すぎる場合は無視
    if (!isPinching && e.changedTouches.length === 1) {
        handleInteraction(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
}, { passive: false });

function checkWin() { if (hasStarted && (board.cells.every(c => !c) || board.cells.every(c => c))) { isWin = true; stopAutoPlay(); document.getElementById('btnRetryLevel').style.display = 'block'; } }
function toggleAutoPlay() { if (isAutoPlaying) stopAutoPlay(); else { if (autoEntries.length === 0) return; isAutoPlaying = true; updateUIText(); processNextAuto(); } }
function stopAutoPlay() { isAutoPlaying = false; autoIndex = -1; clearTimeout(autoTimer); updateUIText(); renderInspector(); }
function processNextAuto() {
    if (!isAutoPlaying || isWin) return;
    autoIndex++; if (autoIndex >= autoEntries.length) autoIndex = 0;
    const e = autoEntries[autoIndex];
    if (e.x < board.width && e.y < board.height) { board.addSource(e.x, e.y); board.step(); board.update(); hasStarted = true; checkWin(); }
    renderInspector(); draw(); autoTimer = setTimeout(processNextAuto, autoSpeed);
}
function addEntry() { autoEntries.push({ x: 0, y: 0, id: Date.now() }); renderInspector(); }
function removeEntry(id) { autoEntries = autoEntries.filter(e => e.id !== id); renderInspector(); }
function renderInspector() {
    const area = document.getElementById('scrollArea'); area.innerHTML = '';
    autoEntries.forEach((e, i) => {
        const d = document.createElement('div'); d.className = `click-entry ${i === autoIndex ? 'active-entry' : ''}`;
        d.innerHTML = `<span>#${i}</span>X:<input type="number" value="${e.x}" oninput="autoEntries[${i}].x=parseInt(this.value)||0">Y:<input type="number" value="${e.y}" oninput="autoEntries[${i}].y=parseInt(this.value)||0"><button style="background:#a44;padding:2px 5px;margin-left:auto;font-size:10px;" onclick="removeEntry(${e.id})">×</button>`;
        area.appendChild(d);
    });
}
function updateSpeed(v) { autoSpeed = 1000 / parseFloat(v); document.getElementById('speedVal').innerText = parseFloat(v).toFixed(1); }
function resetBoard() { if (!board) return; board.sources = []; board.update(); isWin = false; hasStarted = false; document.getElementById('btnRetryLevel').style.display = 'none'; draw(); }
function retryGame() { resetBoard(); stopAutoPlay(); }
window.addEventListener('keydown', e => { if (e.key === 'Escape') backToTitle(); });
draw();
</script>
</body>
</html>
